<!DOCTYPE html>
<html lang="ne">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>एडमिन ड्यासबोर्ड - देबाशिष एस्ट्रो</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar glass-effect" id="navbar">
        <div class="nav-content container">
            <a href="index.html" class="logo">देबाशिष एस्ट्रो - एडमिन</a>
            <div class="nav-links">
                <a href="#" class="nav-item" id="logoutBtn">लगआउट</a>
            </div>
        </div>
    </nav>

    <div class="container dashboard-container fade-in-up">
        <div class="dashboard-grid">
            <!-- Pending Section -->
            <div class="dash-panel">
                <h3><i class="fas fa-clock text-saffron"></i> प्रतीक्षारत परामर्शहरू</h3>
                <div id="pending-list">
                    <p style="color: var(--text-dim);">लोड हुँदैछ...</p>
                </div>
            </div>

            <!-- Confirmed Section -->
            <div class="dash-panel">
                <h3><i class="fas fa-check-circle" style="color: #4CAF50;"></i> पुष्टि गरिएका परामर्शहरू</h3>
                <div id="confirmed-list">
                    <p style="color: var(--text-dim);">लोड हुँदैछ...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = sessionStorage.getItem('adminToken');
            if (!token) {
                window.location.href = 'admin-login.html';
                return;
            }

            document.getElementById('logoutBtn').addEventListener('click', (e) => {
                e.preventDefault();
                sessionStorage.removeItem('adminToken');
                window.location.href = 'index.html';
            });

            async function fetchBookings() {
                try {
                    const response = await fetch('http://localhost:5001/admin/bookings', {
                        headers: { 'Authorization': token }
                    });

                    if (!response.ok) throw new Error("Unauthorized");

                    const data = await response.json();
                    renderBookings('pending', data.pending);
                    renderBookings('confirmed', data.confirmed);
                } catch (err) {
                    console.error(err);
                    alert("सत्र समाप्त भयो वा अनधिकृत।");
                    window.location.href = 'admin-login.html';
                }
            }

            function renderBookings(type, bookings) {
                const container = document.getElementById(`${type}-list`);
                container.innerHTML = '';

                if (!bookings || bookings.length === 0) {
                    container.innerHTML = `<p style="color: var(--text-dim);">कुनै ${type === 'pending' ? 'प्रतीक्षारत' : 'पुष्टि गरिएका'} बुकिङहरू छैनन्।</p>`;
                    return;
                }

                bookings.forEach(b => {
                    const card = document.createElement('div');
                    card.className = `booking-card ${type === 'confirmed' ? 'confirmed' : ''}`;

                    let html = `
                        <div class="booking-details">
                            <span><strong>नाम:</strong> ${b.Name || 'उपलब्ध छैन'}</span>
                            <span><strong>सेवा:</strong> ${b.Service || 'उपलब्ध छैन'}</span>
                            <span><strong>मिति:</strong> ${b.Date || 'उपलब्ध छैन'}</span>
                            <span><strong>निक्षेप सन्दर्भ:</strong> ${b.TransactionID || 'उपलब्ध छैन'}</span>
                        </div>
                    `;

                    if (type === 'pending') {
                        html += `
                            <div class="btn-group">
                                <button class="btn-small btn-confirm" onclick="updateBooking('${b.SessionID}', 'confirm')">पुष्टि गर्नुहोस्</button>
                                <button class="btn-small btn-reject" onclick="updateBooking('${b.SessionID}', 'reject')">अस्वीकार गर्नुहोस्</button>
                            </div>
                        `;
                    }

                    card.innerHTML = html;
                    container.appendChild(card);
                });
            }

            window.updateBooking = async (sessionId, action) => {
                try {
                    const res = await fetch('http://localhost:5001/admin/update', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': token
                        },
                        body: JSON.stringify({ sessionId, action })
                    });
                    if (res.ok) {
                        fetchBookings(); // Refresh UI
                    } else {
                        alert("बुकिङ अपडेट गर्दा त्रुटि भयो।");
                    }
                } catch (err) {
                    console.error(err);
                }
            };

            fetchBookings();
        });
    </script>
</body>

</html>
