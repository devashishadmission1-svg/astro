<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Devashish Astro</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 3rem;
            text-align: center;
        }

        .dashboard-card {
            width: 100%;
            max-width: 1200px;
            padding: 3rem;
            display: none;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .table-container {
            overflow-x: auto;
            border-radius: var(--border-radius-md);
            border: 1px solid var(--glass-border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--font-body);
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }

        th {
            background: rgba(255, 153, 51, 0.1);
            color: var(--saffron);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            transition: var(--transition-fast);
        }

        .back-link:hover {
            color: var(--saffron);
        }

        #login-form {
            margin-top: 2rem;
        }

        .error-msg {
            color: #ff4444;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>

<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <main class="admin-page">
        <!-- Login Section -->
        <div id="login-section" class="login-card glass-effect fade-in">
            <h2 class="section-title" style="font-size: 2rem;">Admin Login</h2>
            <p class="section-desc">Please enter your password to access consultation data.</p>
            
            <form id="login-form">
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <input type="password" id="admin-password" class="form-control" placeholder="Password" required>
                    <div id="login-error" class="error-msg">Incorrect password. Please try again.</div>
                </div>
                <button type="submit" class="btn btn-primary full-width">Unlock Dashboard</button>
            </form>
            
            <div style="margin-top: 2rem;">
                <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Site</a>
            </div>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboard-section" class="dashboard-card glass-effect fade-in">
            <div class="admin-header">
                <div>
                    <h2 class="section-title" style="font-size: 2.2rem; margin-bottom: 0.5rem;">Consultations</h2>
                    <p id="data-count" class="section-desc" style="margin: 0; text-align: left;">Loading records...</p>
                </div>
                <div class="btn-group">
                    <button id="exportExcelBtn" class="btn btn-primary">
                        <i class="fas fa-file-excel"></i> Export (.xlsx)
                    </button>
                    <button id="logoutBtn" class="btn btn-secondary">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>

            <div class="table-container">
                <table id="submissions-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Service</th>
                            <th>DOB/TOB/POB</th>
                            <th>Message</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Data will be injected here -->
                    </tbody>
                </table>
            </div>

            <div style="margin-top: 2rem; display: flex; justify-content: space-between; align-items: center;">
                <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Main Site</a>
                <button id="clearDataBtn" style="background: none; border: none; color: #ff4444; cursor: pointer; font-size: 0.85rem; opacity: 0.6;">
                    <i class="fas fa-trash"></i> Clear All Records
                </button>
            </div>
        </div>
    </main>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
